<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>新增图书</title>
  <style>
    form {width: 300px; margin: 20px auto;}
    div {margin: 10px 0;}
    label {display: inline-block; width: 80px;}
    input {width: 200px; padding: 5px;}
    button {width: 210px; padding: 8px; background: #007bff; color: white; border: none; cursor: pointer;}
  </style>
</head>
<body>
<h2 style="text-align: center;">新增图书</h2>

<form action="/book/add" method="get">
  <div>
    <label>图书名称：</label>
    <input type="text" name="name" required placeholder="请输入图书名">
  </div>
  <div>
    <label>作者：</label>
    <input type="text" name="author" required placeholder="请输入作者">
  </div>
  <div>
    <label>价格：</label>
    <input type="number" step="0.01" name="price" required placeholder="10.0">
  </div>
  <div>
    <label>分类：</label>
    <input type="text" name="type" required placeholder="技术/教材">
  </div>
  <div>
    <button type="submit">💾 保存添加</button>
  </div>
</form>
</body>
</html>
