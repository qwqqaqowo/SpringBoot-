<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书管理系统 - 登录</title>
    <!-- 关键：引入外部CSS文件 -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-box">
    <h2>图书管理系统</h2>
    <form action="/user/login" method="get">
        <div class="input-item">
            <input type="text" name="username" placeholder="请输入账号" required>
        </div>
        <div class="input-item">
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="login-btn">登录系统</button>
    </form>
    <div class="footer">© 2026 图书管理系统 | 实习项目</div>
</div>

</body>
</html>
